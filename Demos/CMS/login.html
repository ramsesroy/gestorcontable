<!DOCTYPE html>
<html lang="es" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Iniciar Sesión - CMS Cobranzas</title>

    <link href="https://fonts.googleapis.com/css?family=Lato:400,700%7CRoboto:400,500%7CExo+2:600&display=swap"
        rel="stylesheet">
    <link type="text/css" href="../../public/vendor/spinkit.css" rel="stylesheet">
    <link type="text/css" href="../../public/vendor/perfect-scrollbar.css" rel="stylesheet">
    <link type="text/css" href="../../public/css/material-icons.css" rel="stylesheet">
    <link type="text/css" href="../../public/css/fontawesome.css" rel="stylesheet">
    <link type="text/css" href="../../public/css/preloader.css" rel="stylesheet">
    <link type="text/css" href="../../public/css/app.css" rel="stylesheet">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5567ff">

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="layout-app ">
    <div class="preloader">
        <div class="sk-chase">
            <div class="sk-chase-dot"></div>
            <div class="sk-chase-dot"></div>
            <div class="sk-chase-dot"></div>
            <div class="sk-chase-dot"></div>
            <div class="sk-chase-dot"></div>
            <div class="sk-chase-dot"></div>
        </div>
    </div>

    <div class="mdk-drawer-layout js-mdk-drawer-layout" data-push data-responsive-width="992px">
        <div class="mdk-drawer-layout__content page-content">

            <!-- Navbar -->
            <div class="navbar navbar-expand navbar-light border-bottom-2" id="default-navbar" data-primary>
                <a href="login.html" class="navbar-brand mr-16pt mx-auto">
                    <span class="avatar avatar-sm navbar-brand-icon mr-0 mr-lg-8pt">
                        <span class="avatar-title rounded bg-primary"><img
                                src="../../public/images/illustration/student/128/white.svg" alt="logo"
                                class="img-fluid" /></span>
                    </span>
                    <span>CMS Cobranzas</span>
                </a>
            </div>

            <div class="pt-32pt pt-sm-64pt pb-32pt">
                <div class="container page__container">
                    <form id="loginForm" class="col-md-5 p-0 mx-auto" autocomplete="off">
                        <div class="form-group">
                            <label class="form-label" for="email">Correo Electrónico:</label>
                            <input id="email" type="email" class="form-control" placeholder="ejemplo@sucursal.com"
                                required autocomplete="new-password">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="password">Contraseña:</label>
                            <div class="input-group">
                                <input id="password" type="password" class="form-control" placeholder="Tu contraseña..."
                                    required autocomplete="new-password">
                                <div class="input-group-append">
                                    <button type="button" class="btn btn-light border" id="togglePassword" tabindex="-1" aria-label="Mostrar/Ocultar contraseña" style="line-height:1;">
                                        <i class="material-icons" id="togglePasswordIcon" style="font-size:18px;vertical-align:middle;">visibility</i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Error Alert -->
                        <div id="loginError" class="alert alert-soft-danger d-none" role="alert">
                            <strong>Error:</strong> Credenciales incorrectas.
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                                <span id="loginBtnText">Ingresar</span>
                                <span id="loginBtnSpinner" class="spinner-border spinner-border-sm ml-8pt d-none" role="status" aria-hidden="true"></span>
                            </button>
                            <div class="mt-16pt">
                                <span class="text-muted">¿No tenés cuenta?</span>
                                <a href="signup.html" class="btn btn-link p-0 ml-4pt">Registrate aquí</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="../../public/vendor/jquery.min.js"></script>
    <script src="../../public/vendor/popper.min.js"></script>
    <script src="../../public/vendor/bootstrap.min.js"></script>
    <script src="../../public/vendor/perfect-scrollbar.min.js"></script>
    <script src="../../public/vendor/dom-factory.js"></script>
    <script src="../../public/vendor/material-design-kit.js"></script>
    <script src="../../public/js/app.js"></script>
    <script src="../../public/js/preloader.js"></script>

    <script>
        // CONFIGURACIÓN DE SUPABASE
        const SUPABASE_URL = 'https://rdxvcftqfelrsfwkryzo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeHZjZnRxZmVscnNmd2tyeXpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzMzOTQsImV4cCI6MjA4OTE0OTM5NH0.QDz2KZ7pCN0u53sJgNG9RC_GUTQgH6nugDjSIg28eTg';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Check if already logged in
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.replace('dashboard.html');
            }
        });

        // Password Toggle
        $('#togglePassword').on('click', function () {
            var input = $('#password');
            var icon = $('#togglePasswordIcon');
            if (input.attr('type') === 'password') {
                input.attr('type', 'text');
                icon.text('visibility_off');
            } else {
                input.attr('type', 'password');
                icon.text('visibility');
            }
        });

        function setLoading(isLoading) {
            var btn = $('#loginBtn');
            var txt = $('#loginBtnText');
            var spinner = $('#loginBtnSpinner');
            if (isLoading) {
                btn.prop('disabled', true);
                txt.text('Ingresando...');
                spinner.removeClass('d-none');
            } else {
                btn.prop('disabled', false);
                txt.text('Ingresar');
                spinner.addClass('d-none');
            }
        }

        // ═══════════════════════
        //  LOGIN LOCKOUT LOGIC
        // ═══════════════════════
        var failedAttempts = 0;
        var lockoutTimer = null;
        var LOCKOUT_DURATION = 30; // seconds
        var MAX_ATTEMPTS = 3;

        function startLockout() {
            var remaining = LOCKOUT_DURATION;
            var btn = $('#loginBtn');
            btn.prop('disabled', true);
            $('#loginBtnSpinner').addClass('d-none');
            $('#loginError').removeClass('d-none')
                .html('<strong>Demasiados intentos.</strong> Podés reintentar en <span id="lockoutCountdown">' + remaining + '</span>s.');

            lockoutTimer = setInterval(function () {
                remaining--;
                $('#lockoutCountdown').text(remaining);
                if (remaining <= 0) {
                    clearInterval(lockoutTimer);
                    lockoutTimer = null;
                    failedAttempts = 0;
                    btn.prop('disabled', false);
                    $('#loginBtnText').text('Ingresar');
                    $('#loginError').addClass('d-none');
                }
            }, 1000);
        }

        $('#loginForm').on('submit', async function (e) {
            e.preventDefault();
            if (lockoutTimer) return; // Still locked out

            const email = $('#email').val();
            const password = $('#password').val();

            setLoading(true);
            $('#loginError').addClass('d-none');

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) throw error;

                // Reset on success
                failedAttempts = 0;
                const userId = data.user.id;
                const { data: profile } = await supabaseClient.from('profiles').select('role').eq('id', userId).single();
                window.location.replace('dashboard.html');

            } catch (error) {
                console.error('Error de login:', error.message);
                failedAttempts++;
                var errMsg = error.message || "";
                if (errMsg.toLowerCase().includes('invalid login credentials')) {
                    errMsg = 'Correo o contraseña incorrectos.';
                }

                if (failedAttempts >= MAX_ATTEMPTS) {
                    startLockout();
                } else {
                    var remaining = MAX_ATTEMPTS - failedAttempts;
                    $('#loginError').removeClass('d-none')
                        .html('<strong>Error:</strong> ' + errMsg + ' <small class="text-danger">(' + remaining + ' intento(s) restante(s))</small>');
                    setLoading(false);
                }
            }
        });
    </script>
</body>

</html>
