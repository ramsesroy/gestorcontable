<!DOCTYPE html>
<html lang="es" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Registro de Personal - CMS Cobranzas</title>

    <link href="https://fonts.googleapis.com/css?family=Lato:400,700%7CRoboto:400,500%7CExo+2:600&display=swap"
        rel="stylesheet">
    <link type="text/css" href="../../public/vendor/spinkit.css" rel="stylesheet">
    <link type="text/css" href="../../public/vendor/perfect-scrollbar.css" rel="stylesheet">
    <link type="text/css" href="../../public/css/material-icons.css" rel="stylesheet">
    <link type="text/css" href="../../public/css/fontawesome.css" rel="stylesheet">
    <link type="text/css" href="../../public/css/preloader.css" rel="stylesheet">
    <link type="text/css" href="../../public/css/app.css" rel="stylesheet">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5567ff">

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="layout-app ">
    <div class="preloader">
        <div class="sk-chase">
            <div class="sk-chase-dot"></div>
            <div class="sk-chase-dot"></div>
            <div class="sk-chase-dot"></div>
            <div class="sk-chase-dot"></div>
            <div class="sk-chase-dot"></div>
            <div class="sk-chase-dot"></div>
        </div>
    </div>

    <div class="mdk-drawer-layout js-mdk-drawer-layout" data-push data-responsive-width="992px">
        <div class="mdk-drawer-layout__content page-content">

            <!-- Navbar -->
            <div class="navbar navbar-expand navbar-light border-bottom-2" id="default-navbar" data-primary>
                <a href="login.html" class="navbar-brand mr-16pt mx-auto">
                    <span class="avatar avatar-sm navbar-brand-icon mr-0 mr-lg-8pt">
                        <span class="avatar-title rounded bg-primary"><img
                                src="../../public/images/illustration/student/128/white.svg" alt="logo"
                                class="img-fluid" /></span>
                    </span>
                    <span>CMS Cobranzas - Registro</span>
                </a>
            </div>

            <div class="pt-32pt pt-sm-64pt pb-32pt">
                <div class="container page__container">
                    <form id="signupForm" class="col-md-5 p-0 mx-auto" autocomplete="off">
                        <div class="form-group">
                            <label class="form-label" for="firstName">Nombre:</label>
                            <input id="firstName" type="text" class="form-control" placeholder="Tu nombre..." required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="email">Correo Electrónico:</label>
                            <input id="email" type="email" class="form-control" placeholder="ejemplo@sucursal.com"
                                required autocomplete="new-password">
                            <small class="text-muted">Usá tu correo institucional o personal.</small>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="password">Contraseña:</label>
                            <input id="password" type="password" class="form-control" placeholder="Mínimo 6 caracteres..."
                                required autocomplete="new-password">
                        </div>

                        <!-- Info Alert -->
                        <div class="alert alert-soft-info small" role="alert">
                            <i class="material-icons mr-8pt">info</i>
                            Al registrarte, tu cuenta quedará pendiente de aprobación por el Administrador antes de que puedas acceder.
                        </div>

                        <!-- Feedback -->
                        <div id="signupMsg" class="alert d-none" role="alert"></div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary btn-block" id="signupBtn">
                                <span id="signupBtnText">Registrarse</span>
                                <span id="signupBtnSpinner" class="spinner-border spinner-border-sm ml-8pt d-none" role="status" aria-hidden="true"></span>
                            </button>
                            <a href="login.html" class="btn btn-link mt-8pt">Volver al Inicio</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="../../public/vendor/jquery.min.js"></script>
    <script src="../../public/vendor/popper.min.js"></script>
    <script src="../../public/vendor/bootstrap.min.js"></script>
    <script src="../../public/vendor/perfect-scrollbar.min.js"></script>
    <script src="../../public/vendor/dom-factory.js"></script>
    <script src="../../public/vendor/material-design-kit.js"></script>
    <script src="../../public/js/app.js"></script>
    <script src="../../public/js/preloader.js"></script>

    <script>
        const SUPABASE_URL = 'https://rdxvcftqfelrsfwkryzo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeHZjZnRxZmVscnNmd2tyeXpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzMzOTQsImV4cCI6MjA4OTE0OTM5NH0.QDz2KZ7pCN0u53sJgNG9RC_GUTQgH6nugDjSIg28eTg';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function setStatus(msg, type = 'info') {
            const div = $('#signupMsg');
            div.removeClass('d-none alert-soft-danger alert-soft-success alert-soft-info')
               .addClass('alert-soft-' + type)
               .html(msg);
        }

        function setLoading(isLoading) {
            const btn = $('#signupBtn');
            const spinner = $('#signupBtnSpinner');
            if (isLoading) {
                btn.prop('disabled', true);
                spinner.removeClass('d-none');
            } else {
                btn.prop('disabled', false);
                spinner.addClass('d-none');
            }
        }

        $('#signupForm').on('submit', async function (e) {
            e.preventDefault();
            const email = $('#email').val();
            const password = $('#password').val();
            const firstName = $('#firstName').val();

            if (password.length < 6) return setStatus('La contraseña debe tener al menos 6 caracteres.', 'danger');

            setLoading(true);
            setStatus('Registrando...', 'info');

            try {
                // 1. Auth Signup
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            first_name: firstName
                        }
                    }
                });

                if (error) throw error;

                // 2. Clear and Success
                $('#signupForm')[0].reset();
                setStatus('¡Registro exitoso! Avisále al Administrador para que habilite tu cuenta y te asigne una sucursal.', 'success');
                
                // Wait and redirect
                setTimeout(() => { window.location.replace('login.html'); }, 5000);

            } catch (error) {
                console.error(error);
                setStatus('Error al registrarse: ' + error.message, 'danger');
            } finally {
                setLoading(false);
            }
        });
    </script>
</body>

</html>
